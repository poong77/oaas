# ============================================================
# 8_OA_AS Nginx Reverse Proxy Configuration
# 위치: /etc/nginx/conf.d/oaas.conf
#
# 역할:
#   - 80 포트 → Next.js standalone (PM2, 3000 포트) 리버스 프록시
#   - ALB/CloudFront에서 SSL 종료한다고 가정 (Nginx는 HTTP만)
#   - Next.js 정적 자산(/_next/static/*) 장기 캐시
#   - 업로드 50MB 허용 (app/api/upload 최대치와 일치)
# ============================================================

upstream nextapp {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # 로깅
    access_log /var/log/nginx/oaas-access.log;
    error_log  /var/log/nginx/oaas-error.log;

    # 업로드 크기 (api/upload.ts MAX_FILE_SIZE와 일치, 50MB)
    client_max_body_size 50M;

    # 타임아웃
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ALB 레벨 헬스체크 (Nginx만 확인)
    location /nginx-health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Next.js 정적 자산 — content-hash가 붙어 있으므로 immutable cache
    location /_next/static/ {
        proxy_pass http://nextapp;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection '';

        # immutable: 동일 경로의 응답은 절대 변하지 않는다 (hash 포함)
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # public/ — favicon, robots.txt, 정적 파일
    location ~* ^/(favicon\.ico|robots\.txt|sitemap\.xml|.*\.(svg|png|jpg|jpeg|gif|webp|ico))$ {
        proxy_pass http://nextapp;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=86400";
    }

    # API + RSC + Route Handlers — 캐시 금지, 전부 Next로
    location / {
        proxy_pass http://nextapp;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / Server-Sent Events (Next 16 미사용이지만 안전망)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass          $http_upgrade;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;
}
